<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LoadConnect – India Ka Freight Network</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'Poppins',sans-serif;background:#d8dce6;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
button,input,textarea{font-family:'Poppins',sans-serif;outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.84)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes checkB{0%{transform:scale(0)}55%{transform:scale(1.2)}100%{transform:scale(1)}}
.fu{animation:fadeUp .3s ease both}
.si{animation:scaleIn .26s ease both}
.bp:active{transform:scale(0.95)!important}
.ch:hover{transform:translateY(-2px);transition:all .18s}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const C={blue:"#1A3C6E",orange:"#FF6B00",bg:"#F5F6FA",white:"#FFFFFF",greyBg:"#EAECF0",text:"#1C1C1E",textSec:"#6B7280",green:"#22C55E",red:"#EF4444",border:"#D1D5DB"};

const LOADS=[
  {id:"1",from:"Chennai",to:"Bangalore",loadType:"Wooden Box",weight:"2",weightUnit:"Ton",vehicle:"Eicher",budget:12000,date:"22/02/2025",postedAgo:"2 hours ago",views:24,unlocks:3,daysLeft:28,status:"active",contact:{name:"Rajesh Kumar",phone:"+91 98765 43210"}},
  {id:"2",from:"Coimbatore",to:"Pune",loadType:"Steel Rods",weight:"6",weightUnit:"Ton",vehicle:"Full Truck",budget:38000,date:"24/02/2025",postedAgo:"5 hours ago",views:51,unlocks:8,daysLeft:18,status:"active",contact:{name:"Suresh Textiles",phone:"+91 77654 32109"}},
  {id:"3",from:"Madurai",to:"Hyderabad",loadType:"Cotton Bales",weight:"4",weightUnit:"Ton",vehicle:"Mini Truck",budget:18500,date:"25/02/2025",postedAgo:"1 day ago",views:12,unlocks:1,daysLeft:0,status:"expired",contact:{name:"Arjun Logistics",phone:"+91 88823 11234"}},
  {id:"4",from:"Salem",to:"Mumbai",loadType:"Machinery Parts",weight:"8",weightUnit:"Ton",vehicle:"Full Truck",budget:55000,date:"26/02/2025",postedAgo:"2 days ago",views:38,unlocks:5,daysLeft:14,status:"active",contact:{name:"Kumar Industries",phone:"+91 99001 44567"}},
  {id:"5",from:"Trichy",to:"Delhi",loadType:"Garments",weight:"1.5",weightUnit:"Ton",vehicle:"Mini Truck",budget:22000,date:"27/02/2025",postedAgo:"3 days ago",views:7,unlocks:0,daysLeft:25,status:"active",contact:{name:"Priya Exports",phone:"+91 90456 78901"}},
  {id:"6",from:"Kochi",to:"Bangalore",loadType:"Electronics",weight:"3",weightUnit:"Ton",vehicle:"Eicher",budget:16000,date:"28/02/2025",postedAgo:"4 days ago",views:19,unlocks:2,daysLeft:22,status:"active",contact:{name:"Nair Distributors",phone:"+91 94567 89012"}},
];
const INIT_N=[
  {id:"1",type:"unlock",title:"Contact Unlocked",body:"A transporter unlocked your Chennai→Bangalore ad",time:"10 min ago",read:false},
  {id:"2",type:"view",title:"New Views",body:"Your ad got 12 new views today",time:"1 hour ago",read:false},
  {id:"3",type:"payment",title:"Payment Successful",body:"₹199 paid for 5-post pack",time:"3 hours ago",read:false},
  {id:"4",type:"expiry",title:"Ad Expiring Soon",body:"Madurai→Hyderabad ad expires in 2 days",time:"6 hours ago",read:true},
  {id:"5",type:"newload",title:"New Load on Route",body:"New Chennai→Bangalore load posted",time:"Yesterday",read:true},
];

// atoms
function Bdg({l,v="green"}){const b={green:C.green,red:C.red,orange:C.orange,blue:C.blue,grey:C.textSec}[v]||C.green;return <span style={{fontSize:10,fontWeight:700,color:"#fff",background:b,padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap",display:"inline-block"}}>{l}</span>;}
function Btn({label,onClick,v="primary",full,sm,dis,style={}}){
  const b={fontWeight:700,borderRadius:sm?8:12,border:"none",cursor:dis?"not-allowed":"pointer",height:sm?34:48,padding:sm?"0 13px":"0 18px",fontSize:sm?11:14,width:full?"100%":"auto",opacity:dis?.4:1,transition:"all .13s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,...style};
  const s={primary:{background:C.orange,color:"#fff"},green:{background:C.green,color:"#fff"},blue:{background:C.blue,color:"#fff"},outline:{background:"transparent",color:C.orange,border:`2px solid ${C.orange}`},"red-outline":{background:"transparent",color:C.red,border:`2px solid ${C.red}`}};
  return <button className="bp" style={{...b,...s[v]}} onClick={dis?undefined:onClick}>{label}</button>;
}
function Hdr({title,sub,back,onBack,right,bell,bellN=0,onBell}){
  return <div style={{background:C.blue,padding:"15px 16px 13px",position:"sticky",top:0,zIndex:50,flexShrink:0}}>
    <div style={{display:"flex",alignItems:"center",gap:9}}>
      {back&&<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1,padding:"0 1px"}}>←</button>}
      <div style={{flex:1}}><div style={{fontSize:16,fontWeight:700,color:"#fff",lineHeight:1.25}}>{title}</div>{sub&&<div style={{fontSize:10,color:"rgba(255,255,255,.62)",marginTop:1}}>{sub}</div>}</div>
      {bell&&<button onClick={onBell} style={{background:"none",border:"none",color:"#fff",fontSize:19,cursor:"pointer",position:"relative",padding:3}}>🔔{bellN>0&&<span style={{position:"absolute",top:0,right:0,background:C.orange,color:"#fff",fontSize:8,fontWeight:700,width:15,height:15,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>{bellN}</span>}</button>}
      {right}
    </div>
  </div>;
}
function Fld({label,ph,val,set,px,type="text",rows}){
  const [f,sf]=useState(false);
  return <div style={{marginBottom:13}}>
    {label&&<div style={{fontSize:11,fontWeight:600,color:C.textSec,marginBottom:5,letterSpacing:.3}}>{label}</div>}
    <div style={{display:"flex",alignItems:rows?"flex-start":"center",background:f?"#fff":C.greyBg,border:`1.5px solid ${f?C.blue:C.border}`,borderRadius:10,padding:"0 13px",transition:"all .2s",minHeight:44}}>
      {px&&<span style={{color:C.orange,fontWeight:700,fontSize:14,marginRight:5,paddingTop:rows?12:0,flexShrink:0}}>{px}</span>}
      {rows?<textarea rows={rows} placeholder={ph} value={val} onChange={e=>set(e.target.value)} onFocus={()=>sf(true)} onBlur={()=>sf(false)} style={{flex:1,background:"transparent",border:"none",resize:"none",fontSize:13,color:C.text,padding:"11px 0",lineHeight:1.5}}/>
      :<input type={type} placeholder={ph} value={val} onChange={e=>set(e.target.value)} onFocus={()=>sf(true)} onBlur={()=>sf(false)} style={{flex:1,background:"transparent",border:"none",fontSize:13,color:C.text,padding:"10px 0"}}/>}
    </div>
  </div>;
}
function Chips({opts,sel,onSel,multi}){
  const on=o=>multi?(sel||[]).includes(o):sel===o;
  const tog=o=>{if(multi){const a=sel||[];onSel(a.includes(o)?a.filter(x=>x!==o):[...a,o]);}else onSel(o);};
  return <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:13}}>{opts.map(o=><button key={o} onClick={()=>tog(o)} style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${on(o)?C.orange:C.border}`,background:on(o)?C.orange:"#fff",color:on(o)?"#fff":C.textSec,fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .16s"}}>{o}</button>)}</div>;
}
function LCard({load,locked=false,onUnlock,onClick,idx=0}){
  const exp=load.status==="expired";
  return <div className="ch fu" onClick={onClick} style={{background:"#fff",borderRadius:13,border:`1px solid ${C.border}`,borderLeft:`3px solid ${exp?C.border:C.orange}`,padding:14,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",cursor:"pointer",transition:"box-shadow .2s",animationDelay:`${idx*.07}s`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
      <span style={{fontSize:15,fontWeight:800,color:exp?C.textSec:C.blue,flex:1,marginRight:7}}>{load.from} → {load.to}</span>
      <Bdg l={exp?"Expired":"Active"} v={exp?"red":"green"}/>
    </div>
    <div style={{fontSize:14,fontWeight:700,color:C.orange,marginBottom:8}}>₹{load.budget?.toLocaleString()}</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:3}}>{[`📦 ${load.loadType}`,`⚖️ ${load.weight} ${load.weightUnit}`,`🚛 ${load.vehicle}`,`📅 ${load.date}`,`🕐 ${load.postedAgo}`].map(m=><span key={m} style={{fontSize:10,color:C.textSec}}>{m}</span>)}</div>
    {load.views!==undefined&&<div style={{display:"flex",gap:9,marginTop:2}}><span style={{fontSize:10,color:C.textSec}}>👁 {load.views}</span><span style={{fontSize:10,color:C.textSec}}>🔓 {load.unlocks}</span></div>}
    {locked&&<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{animation:"shimmer 1.5s infinite",fontSize:15}}>🔒</span><span style={{fontSize:12,fontWeight:600,color:C.textSec,letterSpacing:3}}>+91 •••••••••</span></div>
      <Btn label="Unlock ₹9" onClick={e=>{e.stopPropagation();onUnlock(load);}} v="primary" sm/>
    </div>}
  </div>;
}
function Sht({open,onClose,children,h="58vh"}){
  if(!open)return null;
  return <div style={{position:"absolute",inset:0,zIndex:200}} onClick={onClose}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,background:"#fff",borderRadius:"19px 19px 0 0",padding:"0 18px 26px",maxHeight:h,overflowY:"auto",animation:"slideUp .27s ease"}}>
      <div style={{width:34,height:4,background:C.border,borderRadius:2,margin:"11px auto 16px"}}/>
      {children}
    </div>
  </div>;
}
function StCard({n,label}){return <div style={{flex:1,background:"#fff",borderRadius:11,padding:"12px 7px",textAlign:"center",boxShadow:"0 2px 7px rgba(0,0,0,.06)",border:`1px solid ${C.border}`,minWidth:0}}><div style={{fontSize:20,fontWeight:800,color:C.blue}}>{n}</div><div style={{fontSize:9,color:C.textSec,marginTop:1,lineHeight:1.3}}>{label}</div></div>;}
function PCard({plan,sel,onSel}){
  return <div onClick={onSel} style={{border:`2px solid ${sel||plan.popular?C.orange:C.border}`,borderRadius:13,padding:"13px 15px",marginBottom:10,cursor:"pointer",background:"#fff",position:"relative",transition:"all .18s",transform:sel?"scale(1.01)":"scale(1)"}}>
    {plan.popular&&<div style={{position:"absolute",top:11,right:11}}><Bdg l="POPULAR" v="orange"/></div>}
    <div style={{fontSize:11,fontWeight:600,color:C.textSec}}>{plan.name}</div>
    <div style={{fontSize:21,fontWeight:800,color:C.blue,margin:"3px 0 1px"}}>₹{plan.price}</div>
    <div style={{fontSize:10,color:C.textSec,marginBottom:8}}>{plan.period}</div>
    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8}}>{plan.features.map(f=><div key={f} style={{fontSize:10,color:C.textSec,marginBottom:2}}>✓  {f}</div>)}</div>
  </div>;
}

// screens
function Splash({done}){
  const [p,sp]=useState(0);
  useEffect(()=>{const t=setTimeout(done,2400);let x=0;const iv=setInterval(()=>{x+=1.8;sp(Math.min(x,100));if(x>=100)clearInterval(iv);},36);return()=>{clearTimeout(t);clearInterval(iv);};},[]);
  return <div style={{height:"100%",background:C.blue,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
    <div style={{fontSize:64,opacity:.13,marginBottom:13}}>🚚</div>
    <div style={{display:"flex"}}><span style={{fontSize:34,fontWeight:800,color:"#fff"}}>Load</span><span style={{fontSize:34,fontWeight:800,color:C.orange}}>Connect</span></div>
    <div style={{fontSize:10,fontWeight:500,color:"rgba(255,255,255,.48)",letterSpacing:3.2,marginTop:7,marginBottom:52}}>INDIA KA FREIGHT NETWORK</div>
    <div style={{width:220,height:3,background:"rgba(255,255,255,.13)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:C.orange,borderRadius:2,transition:"width .04s linear",width:`${p}%`}}/></div>
  </div>;
}

function RoleSel({onSel}){
  const [ch,setCh]=useState(null);
  return <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column",padding:24,paddingTop:52}}>
    <div style={{fontSize:24,fontWeight:800,color:C.text,marginBottom:5}}>Welcome! 👋</div>
    <div style={{fontSize:13,color:C.textSec,marginBottom:28}}>How will you use LoadConnect?</div>
    {[{id:"owner",icon:"📦",title:"I want to Send a Load",sub:"Post freight ads & find transporters"},{id:"transporter",icon:"🚛",title:"I'm a Transporter",sub:"Find loads & grow your business"}].map(r=>(
      <div key={r.id} onClick={()=>setCh(r.id)} className="ch" style={{border:`2px solid ${ch===r.id?C.orange:C.border}`,borderRadius:15,padding:18,marginBottom:13,cursor:"pointer",textAlign:"center",transition:"all .2s",background:ch===r.id?"rgba(255,107,0,.04)":"#fff"}}>
        <div style={{fontSize:40,marginBottom:8}}>{r.icon}</div>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>{r.title}</div>
        <div style={{fontSize:11,color:C.textSec,marginTop:3}}>{r.sub}</div>
      </div>
    ))}
    <div style={{marginTop:"auto"}}><Btn label="Continue" onClick={()=>ch&&onSel(ch)} v="primary" full dis={!ch}/><div style={{fontSize:9,color:C.textSec,textAlign:"center",marginTop:9}}>You cannot change your role after this</div></div>
  </div>;
}

function Login({role,onLogin}){
  const [phone,setPhone]=useState("");const [step,setStep]=useState("phone");const [otp,setOtp]=useState(["","","","","",""]);const [cd,setCd]=useState(30);const refs=useRef([]);
  useEffect(()=>{if(step==="otp"&&cd>0){const t=setTimeout(()=>setCd(c=>c-1),1000);return()=>clearTimeout(t);}},[step,cd]);
  const so=(i,v)=>{const n=[...otp];n[i]=v.slice(-1);setOtp(n);if(v&&i<5)refs.current[i+1]?.focus();};
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <div style={{background:C.blue,flex:"0 0 35%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{display:"flex"}}><span style={{fontSize:26,fontWeight:800,color:"#fff"}}>Load</span><span style={{fontSize:26,fontWeight:800,color:C.orange}}>Connect</span></div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:5}}>Sign in to continue</div>
    </div>
    <div style={{flex:1,background:"#fff",borderRadius:"21px 21px 0 0",marginTop:-16,padding:24,paddingTop:28,animation:"slideUp .36s ease",overflowY:"auto"}}>
      {step==="phone"?<>
        <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:16}}>Enter your phone number</div>
        <div style={{display:"flex",background:C.greyBg,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",padding:"0 11px",gap:4,borderRight:`1px solid ${C.border}`}}><span>🇮🇳</span><span style={{fontWeight:700,color:C.blue,fontSize:12}}>+91</span></div>
          <input type="tel" placeholder="9876543210" value={phone} onChange={e=>setPhone(e.target.value)} maxLength={10} style={{flex:1,border:"none",background:"transparent",padding:"12px 11px",fontSize:15,fontWeight:500,color:C.text}}/>
        </div>
        <Btn label="Send OTP" onClick={()=>{if(phone.length>=10){setStep("otp");setCd(30);}}} v="primary" full dis={phone.length<10}/>
        <div style={{fontSize:10,color:C.textSec,textAlign:"center",marginTop:12,lineHeight:1.6}}>By continuing you agree to our <span style={{color:C.blue,fontWeight:600}}>Terms</span> & <span style={{color:C.blue,fontWeight:600}}>Privacy Policy</span></div>
      </>:<>
        <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:3}}>Enter 6-digit OTP</div>
        <div style={{fontSize:11,color:C.textSec,marginBottom:20}}>Sent to +91 {phone}</div>
        <div style={{display:"flex",gap:6,marginBottom:20,justifyContent:"center"}}>{otp.map((v,i)=><input key={i} ref={el=>refs.current[i]=el} type="text" value={v} onChange={e=>so(i,e.target.value)} maxLength={1} style={{width:40,height:46,textAlign:"center",fontSize:18,fontWeight:700,border:`2px solid ${v?C.orange:C.border}`,borderRadius:9,background:v?"#fff":C.greyBg,color:C.text,transition:"all .14s"}}/>)}</div>
        <Btn label="Verify OTP" onClick={()=>otp.join("").length===6&&onLogin(role)} v="primary" full dis={otp.join("").length<6}/>
        <div style={{textAlign:"center",marginTop:11,fontSize:11,color:C.textSec}}>{cd>0?`Resend in ${cd}s`:<span onClick={()=>setCd(30)} style={{color:C.orange,fontWeight:600,cursor:"pointer"}}>Resend OTP</span>}</div>
      </>}
    </div>
  </div>;
}

function OwnerHome({loads,onCard,onAdd,onBell,bellN}){
  const active=loads.filter(l=>l.status==="active");
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <Hdr title="Good morning, Rajesh 🏭" sub="Manage your freight ads" bell onBell={onBell} bellN={bellN}/>
    <div style={{flex:1,overflowY:"auto",padding:14,paddingBottom:16}}>
      <div style={{display:"flex",gap:6,marginBottom:16}}><StCard n={active.length} label="Active Ads"/><StCard n={loads.length} label="Total Posted"/><StCard n={loads.reduce((s,l)=>s+l.views,0)} label="Total Views"/></div>
      <div style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Your Active Ads</div>
      {active.length===0?<div style={{textAlign:"center",padding:"40px 20px"}}>
        <div style={{fontSize:50,opacity:.2,animation:"bounce 1.4s infinite"}}>📦</div>
        <div style={{fontSize:14,fontWeight:600,color:C.text,marginTop:10}}>No active ads</div>
        <div style={{marginTop:13}}><Btn label="Post a Load" onClick={onAdd} v="primary"/></div>
      </div>:active.map((l,i)=><LCard key={l.id} load={l} locked={false} onClick={()=>onCard(l)} idx={i}/>)}
    </div>
  </div>;
}

function MyAds({loads,onCard,onAdd}){
  const [tab,setTab]=useState("Active");
  const data={Active:loads.filter(l=>l.status==="active"),Expired:loads.filter(l=>l.status==="expired"),Drafts:[]};
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <Hdr title="My Ads"/>
    <div style={{display:"flex",background:"#fff",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      {["Active","Expired","Drafts"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"12px 0",background:"none",border:"none",fontSize:12,fontWeight:600,color:tab===t?C.orange:C.textSec,borderBottom:`2px solid ${tab===t?C.orange:"transparent"}`,transition:"all .2s",cursor:"pointer"}}>{t}</button>)}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:14,paddingBottom:16}}>
      {data[tab].length===0?<div style={{textAlign:"center",padding:"40px 20px"}}>
        <div style={{fontSize:50,opacity:.2,animation:"bounce 1.4s infinite"}}>🚛</div>
        <div style={{fontSize:14,fontWeight:600,marginTop:10}}>No {tab.toLowerCase()} ads</div>
        {tab==="Active"&&<div style={{marginTop:13}}><Btn label="Post a Load" onClick={onAdd} v="primary"/></div>}
      </div>:data[tab].map((l,i)=><LCard key={l.id} load={l} locked={false} onClick={()=>onCard(l)} idx={i}/>)}
    </div>
  </div>;
}

function PostLoad({onBack,onSubmit}){
  const [step,setStep]=useState(1);const [from,setFrom]=useState("");const [to,setTo]=useState("");const [desc,setDesc]=useState("");
  const [veh,setVeh]=useState("Any");const [wt,setWt]=useState("");const [wu,setWu]=useState("Ton");const [bud,setBud]=useState("");const [date,setDate]=useState("");const [con,setCon]=useState("");const [rot,setRot]=useState(0);
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <Hdr title="Post a Load" sub={`Step ${step} / 2`} back onBack={()=>step===1?onBack():setStep(1)}/>
    <div style={{height:3,background:C.border,flexShrink:0}}><div style={{height:"100%",background:C.orange,width:step===1?"50%":"100%",transition:"width .4s ease"}}/></div>
    <div style={{flex:1,overflowY:"auto",padding:16,paddingBottom:32}}>
      {step===1?<>
        <Fld label="Pickup City" ph="e.g. Chennai" val={from} set={setFrom} px="📍"/>
        <div style={{display:"flex",justifyContent:"center",margin:"-4px 0 5px"}}><button onClick={()=>{setRot(r=>r+180);const t=from;setFrom(to);setTo(t);}} style={{width:36,height:36,borderRadius:18,background:C.orange,border:"none",fontSize:16,color:"#fff",cursor:"pointer",transition:"transform .4s ease",transform:`rotate(${rot}deg)`}}>⇅</button></div>
        <Fld label="Drop City" ph="e.g. Bangalore" val={to} set={setTo} px="📍"/>
        <Fld label="Description" ph="Describe your goods..." val={desc} set={setDesc} rows={2}/>
        <div style={{fontSize:10,fontWeight:700,color:C.textSec,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Vehicle Type</div>

}

function SuccessPopup({msg,onClose}){
  return <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:18}}>
    <div className="si" style={{background:"#fff",borderRadius:20,padding:30,textAlign:"center",maxWidth:300,width:"100%",boxShadow:"0 16px 52px rgba(0,0,0,.2)"}}>
      <div style={{fontSize:60,marginBottom:11,animation:"checkB .52s ease"}}>✅</div>
      <div style={{fontSize:18,fontWeight:700,color:C.green,marginBottom:6}}>Payment Successful!</div>
      <div style={{fontSize:11,color:C.textSec,marginBottom:20,lineHeight:1.6}}>{msg}</div>
      <Btn label="Continue" onClick={onClose} v="green" full/>
    </div>
  </div>;
}

function TBar({tabs,active,onTab}){
  return <div style={{display:"flex",background:"#fff",borderTop:`1px solid ${C.border}`,height:56,flexShrink:0}}>
    {tabs.map(t=><button key={t.id} onClick={()=>onTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,background:"none",border:"none",color:active===t.id?C.orange:C.textSec,cursor:"pointer",transition:"color .17s",position:"relative",paddingBottom:2}}>
      <span style={{fontSize:18}}>{t.icon}</span>
      <span style={{fontSize:8,fontWeight:600}}>{t.label}</span>
      {t.badge>0&&<span style={{position:"absolute",top:4,right:"calc(50% - 17px)",background:C.red,color:"#fff",fontSize:7,fontWeight:700,width:13,height:13,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
    </button>)}
  </div>;
}

function App(){
  const [sc,setSc]=useState("splash");const [role,setRole]=useState(null);const [otab,setOtab]=useState("home");const [ttab,setTtab]=useState("browse");
  const [loads,setLoads]=useState(LOADS);const [unlocked,setUnlocked]=useState([]);const [notifs,setNotifs]=useState(INIT_N);const [sel,setSel]=useState(null);const [popup,setPopup]=useState(null);
  const unread=notifs.filter(n=>!n.read).length;
  const addN=(n)=>setNotifs(p=>[{id:Date.now().toString(),...n,read:false,time:"Just now"},...p]);
  const go=s=>setSc(s);

  const shell=(content,bg="#F5F6FA")=>(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:bg,overflow:"hidden",position:"relative"}}>
      {content}
      {popup&&<SuccessPopup msg={popup} onClose={()=>setPopup(null)}/>}
    </div>
  );

  let view;
  if(sc==="splash") view=shell(<Splash done={()=>go("role")}/>,C.blue);
  else if(sc==="role") view=shell(<RoleSel onSel={r=>{setRole(r);go("login");}}/>, "#fff");
  else if(sc==="login") view=shell(<Login role={role} onLogin={r=>{setRole(r);setSc(r==="owner"?"owner":"transporter");}}/>);

  else if(sc==="owner"){
    const tabs=[{id:"home",icon:"🏠",label:"Home"},{id:"ads",icon:"📋",label:"My Ads"},{id:"post",icon:"➕",label:"Post"},{id:"notif",icon:"🔔",label:"Alerts",badge:unread},{id:"profile",icon:"👤",label:"Profile"}];
    view=shell(<>
      <div style={{flex:1,minHeight:0,overflowY:"auto",position:"relative"}}>
        {otab==="home"&&<OwnerHome loads={loads} onCard={l=>{setSel(l);go("ad-owner");}} onAdd={()=>setOtab("post")} onBell={()=>setOtab("notif")} bellN={unread}/>}
        {otab==="ads"&&<MyAds loads={loads} onCard={l=>{setSel(l);go("ad-owner");}} onAdd={()=>setOtab("post")}/>}
        {otab==="post"&&<PostLoad onBack={()=>setOtab("home")} onSubmit={data=>{const nl={id:String(Date.now()),from:data.from,to:data.to,loadType:data.desc||"General Goods",weight:data.wt||"5",weightUnit:data.wu,vehicle:data.veh,budget:parseInt(data.bud)||10000,date:data.date||"TBD",postedAgo:"Just now",views:0,unlocks:0,daysLeft:30,status:"active",contact:{name:"You",phone:"+91 "+data.con}};setLoads(p=>[nl,...p]);setSel(nl);go("post-pay");}}/>}
        {otab==="notif"&&<Notifs notifs={notifs} setNotifs={setNotifs}/>}
        {otab==="profile"&&<Profile role="owner" onLogout={()=>{setRole(null);go("role");}}/>}
        {otab==="home"&&<button onClick={()=>setOtab("post")} style={{position:"absolute",bottom:14,right:14,width:50,height:50,borderRadius:25,background:C.orange,border:"none",fontSize:22,color:"#fff",cursor:"pointer",boxShadow:`0 5px 15px rgba(255,107,0,.42)`,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}} className="bp">＋</button>}
      </div>
      <TBar tabs={tabs} active={otab} onTab={setOtab}/>
    </>);
  }
  else if(sc==="ad-owner") view=shell(<AdDetailO load={sel} onBack={()=>go("owner")} onDel={()=>{setLoads(p=>p.filter(l=>l.id!==sel.id));setSel(null);go("owner");setOtab("ads");}}/>);
  else if(sc==="post-pay") view=shell(<PostPay onBack={()=>go("owner")} onSuccess={()=>{go("owner");setOtab("ads");setPopup("Your load ad is now live and visible to transporters!");addN({type:"payment",title:"Ad Published!",body:"Your new load is live"});}}/>);

  else if(sc==="transporter"){
    const tabs=[{id:"browse",icon:"🔍",label:"Browse"},{id:"unlocked",icon:"🔓",label:"Unlocked"},{id:"notif",icon:"🔔",label:"Alerts",badge:unread},{id:"profile",icon:"👤",label:"Profile"}];
    view=shell(<>
      <div style={{flex:1,minHeight:0,overflowY:"auto"}}>
        {ttab==="browse"&&<LoadFeed loads={loads} unlocked={unlocked} onUnlock={l=>{setSel(l);go("unlock-pay");}} onCard={l=>{setSel(l);go("load-detail");}} onBell={()=>setTtab("notif")} bellN={unread}/>}
        {ttab==="unlocked"&&<MyUnlocked loads={loads.filter(l=>unlocked.includes(l.id))} goFeed={()=>setTtab("browse")}/>}
        {ttab==="notif"&&<Notifs notifs={notifs} setNotifs={setNotifs}/>}
        {ttab==="profile"&&<Profile role="transporter" onLogout={()=>{setRole(null);go("role");}}/>}
      </div>
      <TBar tabs={tabs} active={ttab} onTab={setTtab}/>
    </>);
  }
  else if(sc==="load-detail") view=shell(<LoadDetailT load={sel} isUnlocked={unlocked.includes(sel?.id)} onBack={()=>go("transporter")} onUnlockDone={id=>{setUnlocked(p=>[...p,id]);addN({type:"unlock",title:"Contact Unlocked",body:"You unlocked a load contact"});go("contact-revealed");}}/>);
  else if(sc==="unlock-pay"){
    function UnlockPay(){
      const plans=[{id:"s",name:"Single Unlock",price:9,period:"One-time",features:["1 unlock","Valid forever"]},{id:"p",name:"Pack of 10",price:79,period:"Save 12%",features:["10 unlocks","90 days"],popular:true},{id:"m",name:"Monthly Pass",price:299,period:"/month",features:["Unlimited","30 days"]}];
      const [usel,setUsel]=useState("p");const plan=plans.find(p=>p.id===usel);
      return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
        <Hdr title="Unlock Contact" sub={sel?`${sel.from} → ${sel.to}`:""} back onBack={()=>go("transporter")}/>
        <div style={{flex:1,overflowY:"auto",padding:14,paddingBottom:32}}>
          {plans.map(pl=><PCard key={pl.id} plan={pl} sel={usel===pl.id} onSel={()=>setUsel(pl.id)}/>)}
          <Btn label={`Pay ₹${plan?.price} via UPI`} onClick={()=>{setUnlocked(p=>[...p,sel.id]);addN({type:"unlock",title:"Contact Unlocked",body:`You unlocked ${sel.from}→${sel.to} contact`});go("contact-revealed");}} v="primary" full/>
        </div>
      </div>;
    }
    view=shell(<UnlockPay/>);
  }
  else if(sc==="contact-revealed") view=shell(<ContactRevealed load={sel} onBack={()=>go("transporter")}/>,"#fff");
  else if(sc==="plans") view=shell(<Plans onBack={()=>go(role==="owner"?"owner":"transporter")}/>);
  else view=shell(<div style={{padding:40,textAlign:"center",color:C.textSec}}>Unknown: {sc}</div>);

  const isLight=sc==="role";
  return(
    <div style={{width:"100%",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#d8dce6",padding:12}}>
      <div style={{width:375,height:812,background:C.bg,borderRadius:42,overflow:"hidden",boxShadow:"0 28px 72px rgba(0,0,0,.38),inset 0 0 0 9px #111",position:"relative",display:"flex",flexDirection:"column"}}>
        {/* notch */}
        <div style={{height:42,background:["splash","login"].includes(sc)?C.blue:sc==="role"?"#fff":C.blue,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",flexShrink:0,zIndex:60}}>
          <span style={{fontSize:10,fontWeight:700,color:isLight?C.text:"#fff"}}>9:41</span>
          <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",width:110,height:26,background:"#000",borderRadius:"0 0 14px 14px"}}/>
          <span style={{fontSize:10,color:isLight?C.text:"#fff",letterSpacing:1}}>● ● ▌</span>
        </div>
        <div style={{flex:1,minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column"}}>{view}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
